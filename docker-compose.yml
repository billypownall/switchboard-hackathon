services:
  quickcart:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: file:/data/dev.db
      NODE_ENV: production
    volumes:
      - quickcart-data:/data
      - quickcart-repro-output:/app/public/repro-output
    command: ["npm", "run", "start:prod"]

volumes:
  quickcart-data:
  quickcart-repro-output:
